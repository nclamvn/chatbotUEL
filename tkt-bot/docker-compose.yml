services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tkt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tkt}
      POSTGRES_DB: tktbot
    ports:
      - "5433:5432"
    volumes:
      - tkt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tkt -d tktbot"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://tkt:${POSTGRES_PASSWORD:-tkt}@db:5432/tktbot
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      COMPOSER_MODEL: ${COMPOSER_MODEL:-claude-sonnet-4-6}
      EMBEDDINGS: ${EMBEDDINGS:-hash}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "3002:3000"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - tkt_caddy_data:/data
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    depends_on:
      - api
      - web

volumes:
  tkt_pgdata:
  tkt_caddy_data:
