services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tkt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tkt}
      POSTGRES_DB: tktbot
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - tkt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tkt -d tktbot"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://tkt:${POSTGRES_PASSWORD:-tkt}@db:5432/tktbot
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      EMBEDDINGS: ${EMBEDDINGS:-hash}
      SITE_ADDRESS: ${SITE_ADDRESS:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      MAX_QUESTION_LEN: ${MAX_QUESTION_LEN:-500}
      MODE: ${MODE:-template}
      ADMIN_USER: ${ADMIN_USER:-}
      ADMIN_PASS: ${ADMIN_PASS:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_STAGING: ${NEXT_PUBLIC_STAGING:-1}
    environment:
      STAGING_USER: ${STAGING_USER:-}
      STAGING_PASS: ${STAGING_PASS:-}
    ports:
      - "3002:3000"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - tkt_caddy_data:/data
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    depends_on:
      - api
      - web

volumes:
  tkt_pgdata:
  tkt_caddy_data:
